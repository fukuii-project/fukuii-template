# OPT-IN gap-filler — Trivy for repos with Dockerfiles / compose / IaC.
#
# The org baseline (CodeQL + secret scanning) does NOT scan container images or IaC.
# Enable this on Docker/infra repos (e.g. ecosystem-infra, the client image). Delete it
# from source-only repos where it does nothing.
#
# To adopt: uncomment the push/pull_request triggers below.
# NOTE (supply-chain): pin every action `uses:` to a commit SHA via sentinel before enabling.
name: trivy

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:

permissions:
  contents: read

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Trivy filesystem + config + secret scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
